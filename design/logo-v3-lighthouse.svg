<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="towerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <radialGradient id="beamGrad" cx="0.5" cy="0" r="0.5">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Hexagon -->
  <polygon points="100,20 165,58 165,130 100,168 35,130 35,58"
           fill="#1A1A2E" stroke="#F97316" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Lighthouse tower -->
  <rect x="75" y="70" width="50" height="90" rx="4" fill="none" stroke="url(#towerGrad)" stroke-width="3"/>
  <rect x="85" y="80" width="30" height="25" rx="2" fill="#F97316" opacity="0.15"/>
  <rect x="85" y="115" width="30" height="20" rx="2" fill="#F97316" opacity="0.15"/>
  <!-- Beacon light -->
  <circle cx="100" cy="72" r="6" fill="#F97316"/>
  <!-- Beacon beam (cone) -->
  <polygon points="100,72 160,30 155,20 100,62" fill="#F97316" opacity="0.15"/>
  <polygon points="100,72 40,30 45,20 100,62" fill="#F97316" opacity="0.1"/>
  <!-- Tower base line -->
  <line x1="70" y1="158" x2="130" y2="158" stroke="#F97316" stroke-width="2" opacity="0.5"/>
</svg>
