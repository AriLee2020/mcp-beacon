<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background -->
  <polygon points="100,18 163,55 163,127 100,164 37,127 37,55"
           fill="#1A1A2E" stroke="url(#hexGrad)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Letter B (brand initial for BEACON) -->
  <text x="100" y="120" font-family="Outfit, sans-serif" font-size="88" font-weight="700" 
        fill="url(#hexGrad)" text-anchor="middle" dominant-baseline="middle">B</text>
  <!-- Rays from top -->
  <line x1="100" y1="60" x2="100" y2="18" stroke="#FDBA74" stroke-width="2" opacity="0.8"/>
  <line x1="100" y1="60" x2="130" y2="43" stroke="#FDBA74" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="60" x2="70" y2="43" stroke="#FDBA74" stroke-width="1.5" opacity="0.6"/>
  <!-- Beacon dot -->
  <circle cx="100" cy="170" r="6" fill="#F97316" opacity="0.5"/>
</svg>
