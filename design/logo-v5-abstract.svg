<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
  </defs>
  <!-- Abstract hexagon segments -->
  <!-- Top-left segment -->
  <polygon points="100,20 160,55 130,72 100,55 70,38 40,55" 
           fill="url(#g1)" opacity="0.9"/>
  <!-- Top-right segment -->
  <polygon points="160,55 160,90 130,107 130,72 100,55" 
           fill="url(#g2)" opacity="0.7"/>
  <!-- Right segment -->
  <polygon points="160,90 160,125 130,142 130,107" 
           fill="url(#g1)" opacity="0.5"/>
  <!-- Bottom-right segment -->
  <polygon points="160,125 100,160 130,142" 
           fill="url(#g2)" opacity="0.3"/>
  <!-- Bottom-left segment -->
  <polygon points="100,160 40,125 40,90 70,107 100,125" 
           fill="url(#g1)" opacity="0.4"/>
  <!-- Left segment -->
  <polygon points="40,90 40,55 70,38 70,72" 
           fill="url(#g2)" opacity="0.2"/>
  
  <!-- Center beacon dot -->
  <circle cx="100" cy="95" r="8" fill="#F97316"/>
  <circle cx="100" cy="95" r="16" fill="none" stroke="#F97316" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Hexagon outline -->
  <polygon points="100,20 160,55 160,125 100,160 40,125 40,55"
           fill="none" stroke="#1A1A2E" stroke-width="2" stroke-linejoin="round" opacity="0.3"/>
</svg>
