<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0F1629"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Large hexagon watermark -->
  <polygon points="600,80 920,265 920,635 600,820 280,635 280,265" 
           fill="none" stroke="#F97316" stroke-width="1" opacity="0.08"/>
  
  <!-- Logo hexagon -->
  <polygon points="180,200 280,258 280,374 180,432 80,374 80,258"
           fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="180,225 260,271 260,361 180,407 100,361 100,271"
           fill="url(#accentGrad)" opacity="0.1"/>
  <circle cx="180" cy="316" r="24" fill="url(#accentGrad)"/>
  <circle cx="180" cy="316" r="45" fill="#F97316" opacity="0.1"/>
  
  <!-- Rays -->
  <line x1="180" y1="316" x2="180" y2="210" stroke="#F97316" stroke-width="2" opacity="0.4"/>
  <line x1="180" y1="316" x2="240" y2="281" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  <line x1="180" y1="316" x2="120" y2="281" stroke="#F97316" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Text -->
  <text x="360" y="285" font-family="Outfit, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="-2">MCP Beacon</text>
  <text x="360" y="340" font-family="Inter, sans-serif" font-size="28" font-weight="400" fill="#9CA3AF">AI Agent Monitoring, Illuminated</text>
  
  <!-- Bottom tagline -->
  <text x="600" y="560" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#6B7280" text-anchor="middle">Real-time observability · Cost tracking · Smart alerts</text>
</svg>
