  <line x1="60" y1="60" x2="85" y2="45" stroke="#F97316" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="60" x2="35" y2="45" stroke="#F97316" stroke-width="1.5" opacity="0.5"/>
  
